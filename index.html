<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тренажёр словарных слов — 3–5 классы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(160deg, #f9efe2 0%, #f2dbb8 100%);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fffdf7;
            border-radius: 48px;
            box-shadow: 0 30px 70px rgba(120, 70, 15, 0.2);
            padding: 30px 22px 28px;
            max-width: 780px;
            width: 100%;
            text-align: center;
            border: 2px solid #e2c69b;
            position: relative;
        }
        .difficulty-panel {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .diff-btn {
            background: #fff6e8;
            border: 2px solid #c9a77b;
            padding: 9px 16px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            color: #5e3e1c;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.3px;
            background: #f7ecdb;
            white-space: nowrap;
        }
        .diff-btn.active {
            background: #dba54b;
            border-color: #8b5a2b;
            color: white;
            box-shadow: 0 6px 14px rgba(180, 110, 20, 0.35);
            transform: scale(1.02);
        }
        .diff-btn:hover {
            background: #edd2ac;
            border-color: #a8763e;
        }
        .diff-btn.expert-btn {
            background: #fae6d2;
            border-color: #b5713a;
            color: #582f0e;
        }
        .diff-btn.expert-btn.active {
            background: #b9450e;
            border-color: #702e0c;
            color: #fff7e6;
            box-shadow: 0 6px 16px rgba(160, 70, 0, 0.5);
        }
        .alphabet-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin: 8px 0 16px;
            padding: 10px;
            background: #faf3e8;
            border-radius: 25px;
            border: 1px dashed #cfaa70;
        }
        .alpha-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid #c9a77b;
            background: #fff6e8;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            color: #5e3e1c;
            transition: 0.15s;
            text-transform: uppercase;
        }
        .alpha-btn.active {
            background: #c18f2e;
            color: white;
            border-color: #7a4f1a;
            box-shadow: 0 3px 8px rgba(160, 110, 20, 0.3);
        }
        .alpha-btn:hover {
            background: #edd2ac;
        }
        .alpha-btn:disabled {
            opacity: 0.3;
            cursor: default;
        }
        h1 {
            font-size: 2rem;
            color: #553818;
            margin-bottom: 5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        h1 span {
            background: #f1d7a7;
            padding: 4px 18px;
            border-radius: 30px;
            font-size: 1rem;
            color: #4a3112;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 5px 18px;
            gap: 15px;
            flex-wrap: wrap;
        }
        .progress {
            background: #e9d2b0;
            height: 14px;
            border-radius: 20px;
            flex: 2;
            min-width: 120px;
            overflow: hidden;
        }
        .progress-fill {
            background: #c18f2e;
            height: 100%;
            width: 0%;
            border-radius: 20px;
            transition: width 0.4s ease;
            box-shadow: 0 0 10px #e7b64b;
        }
        .score-box {
            background: #f3e5d0;
            border-radius: 25px;
            padding: 6px 18px;
            font-weight: 700;
            color: #4a351b;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.1rem;
        }
        .word-card {
            background: #fef9f0;
            border: 2px dashed #cfaa70;
            border-radius: 60px;
            padding: 28px 15px;
            margin: 10px 0 20px;
        }
        .word-display {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: #4b3820;
            word-break: break-word;
            line-height: 1.4;
        }
        .underline-letter {
            display: inline-block;
            border-bottom: 5px solid #bf7b2c;
            margin: 0 4px;
            padding: 0 7px;
            min-width: 50px;
            color: #b6490e;
            background: #ffedcf;
            border-radius: 12px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 22px;
            margin: 20px 0 14px;
        }
        .letter-btn {
            background: #ffffff;
            border: 3px solid #bc8f64;
            border-radius: 30px;
            width: 80px;
            height: 80px;
            font-size: 2.7rem;
            font-weight: bold;
            color: #4f3218;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 0 #aa7e56;
            background: #fef3e0;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .letter-btn:hover {
            background: #f8e2bf;
            border-color: #a86f32;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #946e3b;
        }
        .letter-btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #75562c;
        }
        .letter-btn.correct-highlight {
            background: #b1d89b;
            border-color: #2f6321;
            color: #1a3f0c;
            box-shadow: 0 0 22px #85c34a;
        }
        .letter-btn.wrong-highlight {
            background: #f4a5b0;
            border-color: #b0273a;
            color: #631515;
            box-shadow: 0 0 15px #d15454;
        }
        .message {
            font-size: 1.3rem;
            font-weight: 600;
            min-height: 42px;
            color: #4d3a20;
            margin: 8px 0 10px;
        }
        .restart-btn {
            background: #f5e9d3;
            border: 2px solid #b58954;
            font-size: 1rem;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            color: #4f3920;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }
        .restart-btn:hover {
            background: #e5cca8;
            border-color: #8a5d31;
        }
        .completed-message {
            color: #276112;
            font-weight: bold;
        }
        .mode-label {
            font-size: 0.85rem;
            color: #7a5d3a;
            margin-bottom: -5px;
            font-style: italic;
        }
        @media (max-width: 550px) {
            .word-display {
                font-size: 2.2rem;
                letter-spacing: 3px;
            }
            .letter-btn {
                width: 60px;
                height: 60px;
                font-size: 2rem;
            }
            .diff-btn {
                padding: 7px 10px;
                font-size: 0.8rem;
            }
            .alpha-btn {
                width: 30px;
                height: 30px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 Словарный тренажёр <span>3–5 кл.</span></h1>

        <div class="difficulty-panel" id="difficultyPanel">
            <button class="diff-btn active" data-level="easy">🌱 3–4 класс</button>
            <button class="diff-btn" data-level="medium">🌿 5 класс</button>
            <button class="diff-btn" data-level="hard">🌳 Смешанные</button>
            <button class="diff-btn" data-level="full">📖 Весь список</button>
            <button class="diff-btn expert-btn" data-level="expert">⭐ Эксперт</button>
            <button class="diff-btn" data-level="alphabet">🔤 По алфавиту</button>
        </div>

        <div class="alphabet-panel" id="alphabetPanel" style="display: none;"></div>
        <div class="mode-label" id="modeLabel"></div>

        <div class="stats">
            <div class="progress">
                <div class="progress-fill" id="progressFill" style="width: 0%;"></div>
            </div>
            <div class="score-box">
                <span>✅</span> <span id="scoreText">0/0</span>
            </div>
        </div>

        <div class="word-card">
            <div class="word-display" id="wordDisplay"></div>
        </div>

        <div class="options" id="optionsContainer"></div>
        <div class="message" id="messageBox"></div>

        <button class="restart-btn" id="restartButton">🔄 Пройти заново</button>
    </div>

            let currentLevel = 'easy';
            let selectedLetter = null; // для режима "по алфавиту"
            let wordPool = [];
            let shuffledWords = [];
            let currentIndex = 0;
            let correctCount = 0;
            let totalWords = 0;
            let answered = false;

            // Экспертный режим
            let expertStep = 0;
            let currentExpertWord = null;
            let expertFirstCorrect = false;

            // DOM
            const difficultyButtons = document.querySelectorAll('.diff-btn');
            const alphabetPanel = document.getElementById('alphabetPanel');
            const modeLabel = document.getElementById('modeLabel');
            const wordDisplay = document.getElementById('wordDisplay');
            const optionsContainer = document.getElementById('optionsContainer');
            const messageBox = document.getElementById('messageBox');
            const progressFill = document.getElementById('progressFill');
            const scoreText = document.getElementById('scoreText');
            const restartBtn = document.getElementById('restartButton');

            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            function buildAlphabetPanel() {
                alphabetPanel.innerHTML = '';
                russianAlphabet.forEach(letter => {
                    const btn = document.createElement('button');
                    btn.className = 'alpha-btn';
                    btn.textContent = letter.toUpperCase();
                    btn.setAttribute('data-letter', letter);
                    if (alphabetGroups[letter] && alphabetGroups[letter].length > 0) {
                        btn.addEventListener('click', () => selectLetter(letter));
                    } else {
                        btn.disabled = true;
                    }
                    if (selectedLetter === letter) btn.classList.add('active');
                    alphabetPanel.appendChild(btn);
                });
            }

            function selectLetter(letter) {
                selectedLetter = letter;
                currentLevel = 'alphabet';
                // Обновить активные кнопки
                difficultyButtons.forEach(b => b.classList.remove('active'));
                const alphaBtn = document.querySelector(`.diff-btn[data-level="alphabet"]`);
                if (alphaBtn) alphaBtn.classList.add('active');
                buildAlphabetPanel();
                document.querySelectorAll('.alpha-btn').forEach(b => {
                    b.classList.toggle('active', b.getAttribute('data-letter') === letter);
                });
                modeLabel.textContent = `Буква: ${letter.toUpperCase()}`;
                startGame();
            }

            function setWordPool() {
                if (currentLevel === 'easy') wordPool = [...basicEasy];
                else if (currentLevel === 'medium') {
                    // 5 класс: примерно половина полного списка (более сложные)
                    wordPool = fullWordList.filter((_, i) => i % 2 === 1);
                }
                else if (currentLevel === 'hard') {
                    // Смешанные: лёгкие + средние
                    wordPool = [...basicEasy, ...fullWordList.filter((_, i) => i % 3 === 0)];
                }
                else if (currentLevel === 'full') wordPool = [...fullWordList];
                else if (currentLevel === 'expert') wordPool = [...expertWords];
                else if (currentLevel === 'alphabet' && selectedLetter) {
                    wordPool = alphabetGroups[selectedLetter] || [];
                }
                else wordPool = [...fullWordList];
            }

            function updateProgressUI() {
                const percent = totalWords > 0 ? (currentIndex / totalWords) * 100 : 0;
                progressFill.style.width = `${percent}%`;
                scoreText.textContent = `${correctCount}/${totalWords}`;
            }

            function renderWord() {
                if (currentIndex >= totalWords) {
                    wordDisplay.innerHTML = '🎉 Превосходно!';
                    optionsContainer.innerHTML = '';
                    messageBox.innerHTML = '<span class="completed-message">Все слова пройдены!</span>';
                    progressFill.style.width = '100%';
                    scoreText.textContent = `${correctCount}/${totalWords}`;
                    return;
                }

                const wordObj = shuffledWords[currentIndex];

                if (currentLevel === 'expert' && Array.isArray(wordObj.missing)) {
                    currentExpertWord = wordObj;
                    expertStep = 0;
                    expertFirstCorrect = false;
                    renderExpertStep(wordObj, 0);
                } else {
                    currentExpertWord = null;
                    renderSimpleWord(wordObj);
                }
                answered = false;
            }

            function renderSimpleWord(wordObj) {
                const displayHtml = wordObj.word.replace('...', '<span class="underline-letter">_</span>');
                wordDisplay.innerHTML = displayHtml;
                optionsContainer.innerHTML = '';
                const shuffledOptions = shuffleArray([...wordObj.options]);
                shuffledOptions.forEach(letter => {
                    const btn = document.createElement('div');
                    btn.className = 'letter-btn';
                    btn.textContent = letter.toUpperCase();
                    btn.addEventListener('click', (e) => handleSimpleAnswer(letter, btn, wordObj));
                    optionsContainer.appendChild(btn);
                });
                messageBox.textContent = 'Выбери пропущенную букву ✏️';
            }

            function renderExpertStep(wordObj, step) {
                const missingArray = wordObj.missing;
                const optionsArray = wordObj.options;
                let displayHtml = wordObj.word;
                if (step === 0) {
                    displayHtml = displayHtml.replace('...', '<span class="underline-letter">_</span>');
                } else {
                    displayHtml = displayHtml.replace('...', `<span style="color:#2d6a4f; font-weight:bold;">${missingArray[0]}</span>`);
                    displayHtml = displayHtml.replace('...', '<span class="underline-letter">_</span>');
                }
                wordDisplay.innerHTML = displayHtml;
                const currentOptions = optionsArray[step];
                const shuffledOpts = shuffleArray([...currentOptions]);
                optionsContainer.innerHTML = '';
                shuffledOpts.forEach(letter => {
                    const btn = document.createElement('div');
                    btn.className = 'letter-btn';
                    btn.textContent = letter.toUpperCase();
                    btn.addEventListener('click', (e) => handleExpertAnswer(letter, btn, wordObj, step));
                    optionsContainer.appendChild(btn);
                });
                messageBox.innerHTML = step === 0 ? 'Выбери <strong>первую</strong> букву 1️⃣' : 'Теперь <strong>вторую</strong> букву 2️⃣';
            }

            function handleSimpleAnswer(selectedLetter, clickedBtn, wordObj) {
                if (answered) return;
                answered = true;
                const isCorrect = (selectedLetter === wordObj.missing);
                highlightAllButtons(wordObj.missing, selectedLetter, clickedBtn, isCorrect);
                showSimpleResult(wordObj, isCorrect);
                updateProgressUI();
                scheduleNextWord();
            }

            function handleExpertAnswer(selectedLetter, clickedBtn, wordObj, step) {
                if (answered && step === expertStep) return;
                const missingArray = wordObj.missing;
                if (step === 0) {
                    const isFirstCorrect = (selectedLetter === missingArray[0]);
                    highlightExpertButtons(missingArray[0], selectedLetter, clickedBtn, isFirstCorrect);
                    if (isFirstCorrect) {
                        expertFirstCorrect = true;
                        setTimeout(() => {
                            expertStep = 1;
                            renderExpertStep(wordObj, 1);
                            answered = false;
                        }, 800);
                    } else {
                        answered = true;
                        expertFirstCorrect = false;
                        showExpertFailResult(wordObj, 0);
                        updateProgressUI();
                        scheduleNextWord();
                    }
                } else if (step === 1) {
                    const isSecondCorrect = (selectedLetter === missingArray[1]);
                    highlightExpertButtons(missingArray[1], selectedLetter, clickedBtn, isSecondCorrect);
                    answered = true;
                    if (expertFirstCorrect && isSecondCorrect) {
                        correctCount++;
                        showExpertSuccessResult(wordObj);
                    } else {
                        showExpertFailResult(wordObj, 1);
                    }
                    updateProgressUI();
                    scheduleNextWord();
                }
            }

            function highlightAllButtons(correctLetter, selectedLetter, clickedBtn, isCorrect) {
                const allButtons = document.querySelectorAll('.letter-btn');
                allButtons.forEach(btn => {
                    btn.style.pointerEvents = 'none';
                    if (btn.textContent.toLowerCase() === correctLetter) btn.classList.add('correct-highlight');
                });
                if (isCorrect) clickedBtn.classList.add('correct-highlight');
                else clickedBtn.classList.add('wrong-highlight');
            }

            function highlightExpertButtons(correctLetter, selectedLetter, clickedBtn, isCorrect) {
                const allButtons = document.querySelectorAll('.letter-btn');
                allButtons.forEach(btn => {
                    btn.style.pointerEvents = 'none';
                    if (btn.textContent.toLowerCase() === correctLetter) btn.classList.add('correct-highlight');
                });
                if (isCorrect) clickedBtn.classList.add('correct-highlight');
                else clickedBtn.classList.add('wrong-highlight');
            }

            function showSimpleResult(wordObj, isCorrect) {
                if (isCorrect) {
                    correctCount++;
                    messageBox.innerHTML = '✅ Верно!';
                    wordDisplay.innerHTML = wordObj.word.replace('...', `<span style="color:#2d6a4f; font-weight:bold;">${wordObj.missing}</span>`);
                } else {
                    messageBox.innerHTML = `❌ Ошибка. Верная буква: <strong>${wordObj.missing.toUpperCase()}</strong>`;
                    wordDisplay.innerHTML = wordObj.word.replace('...', `<span style="color:#b0413b; font-weight:bold;">${wordObj.missing}</span>`);
                }
            }

            function showExpertSuccessResult(wordObj) {
                const m = wordObj.missing;
                let html = wordObj.word;
                html = html.replace('...', `<span style="color:#2d6a4f; font-weight:bold;">${m[0]}</span>`);
                html = html.replace('...', `<span style="color:#2d6a4f; font-weight:bold;">${m[1]}</span>`);
                wordDisplay.innerHTML = html;
                messageBox.innerHTML = '✅ Отлично! Обе буквы верны.';
            }

            function showExpertFailResult(wordObj, failedStep) {
                const m = wordObj.missing;
                let html = wordObj.word;
                html = html.replace('...', `<span style="color:${failedStep===0?'#b0413b':'#2d6a4f'}; font-weight:bold;">${m[0]}</span>`);
                html = html.replace('...', `<span style="color:${failedStep===1?'#b0413b':'#2d6a4f'}; font-weight:bold;">${m[1]}</span>`);
                wordDisplay.innerHTML = html;
                messageBox.innerHTML = `❌ Неверно. Правильно: <strong>${m[0].toUpperCase()}</strong> и <strong>${m[1].toUpperCase()}</strong>`;
            }

            function scheduleNextWord() {
                setTimeout(() => {
                    currentIndex++;
                    updateProgressUI();
                    renderWord();
                }, 1900);
            }

            function startGame() {
                setWordPool();
                if (wordPool.length === 0) {
                    wordDisplay.innerHTML = '😕 Нет слов';
                    optionsContainer.innerHTML = '';
                    messageBox.textContent = 'Выбери другую букву';
                    totalWords = 0;
                    correctCount = 0;
                    updateProgressUI();
                    return;
                }
                shuffledWords = shuffleArray([...wordPool]);
                totalWords = shuffledWords.length;
                currentIndex = 0;
                correctCount = 0;
                answered = false;
                expertStep = 0;
                currentExpertWord = null;
                expertFirstCorrect = false;
                updateProgressUI();
                renderWord();
            }

            function changeLevel(level) {
                if (level === 'alphabet') {
                    currentLevel = 'alphabet';
                    alphabetPanel.style.display = 'flex';
                    modeLabel.style.display = 'block';
                    buildAlphabetPanel();
                    if (!selectedLetter) {
                        selectedLetter = 'а';
                        selectLetter('а');
                        return;
                    }
                    selectLetter(selectedLetter);
                    return;
                }
                currentLevel = level;
                selectedLetter = null;
                alphabetPanel.style.display = 'none';
                modeLabel.style.display = 'none';
                modeLabel.textContent = '';
                difficultyButtons.forEach(b => b.classList.remove('active'));
                const activeBtn = document.querySelector(`.diff-btn[data-level="${level}"]`);
                if (activeBtn) activeBtn.classList.add('active');
                startGame();
            }

            difficultyButtons.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const level = e.currentTarget.getAttribute('data-level');
                    changeLevel(level);
                });
            });

            restartBtn.addEventListener('click', () => startGame());

            // Старт
            alphabetPanel.style.display = 'none';
            modeLabel.style.display = 'none';
            startGame();
        })();
    </script>
</body>
</html>
